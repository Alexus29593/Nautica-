<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLW2Kd5jqnvnV0-lL3jnfs_r75V6xeMoCh9bS_pETsSrZTS1J1Tc3YViL2D8IbUZgRplHDUqt8GmZA/pub?output=tsv';
    let inventory = [], curPrice = 0, curTorre = "", slideIdx = 0, autoInterval;
    
    // Variables para el deslizamiento táctil
    let touchstartX = 0;
    let touchendX = 0;

    fetch(sheetUrl).then(r => r.text()).then(data => {
        const lines = data.trim().split('\n');
        inventory = lines.slice(1).map(l => {
            const c = l.split('\t');
            return { t: c[0].replace('TORRE ', '').trim(), u: c[1].trim(), r: c[2].trim(), m: c[4].trim(), area: c[5].trim(), v: c[6].trim(), p: c[8].trim(), disp: c[9].trim().toUpperCase() };
        }).filter(i => i.disp !== 'NO');
        updateStats();
        renderCatalog(inventory);
    });

    function updateStats() {
        const availA = inventory.filter(i => i.t === 'A').length, availB = inventory.filter(i => i.t === 'B').length;
        const soldA = 190 - availA, soldB = 190 - availB;
        document.getElementById('stats-bar').innerHTML = `
            <span class="stats-main">Tablero de Disponibilidad Nautica</span>
            <div class="stats-grid">
                <div class="stat-item">Ventas Torre A: ${soldA} (${((soldA/190)*100).toFixed(1)}%)</div>
                <div class="stat-item">Ventas Torre B: ${soldB} (${((soldB/190)*100).toFixed(1)}%)</div>
                <div class="stat-item stat-highlight">Disponibles: ${inventory.length} de 380</div>
            </div>`;
    }

    function renderCatalog(data) {
        const grid = document.getElementById('catalog');
        grid.innerHTML = data.map(i => `
            <div class="card" onclick="openModal('${i.u}')">
                <div class="card-img-placeholder"><img src="${i.m.toUpperCase().replace(/\s+/g,'')}-1.jpg" style="width:100%; height:100%; object-fit:contain;" onerror="this.src='comodin.jpg'"></div>
                <div class="card-content">
                    <h3 class="card-title">Unidad ${i.u}</h3>
                    <div class="card-details"><b>Torre ${i.t}</b> | ${i.area} m²</div>
                    <div class="card-price">${i.p}</div>
                </div>
            </div>`).join('');
    }

    function openModal(uId) {
        const item = inventory.find(i => i.u === uId);
        curPrice = parseFloat(item.p.replace(/[^0-9.]/g, '')) || 0, curTorre = item.t;
        const modelKey = item.m.toUpperCase().replace(/\s+/g,'');
        
        const carousel = document.getElementById('carousel-images');
        document.getElementById('modal-title').innerText = `Unidad ${item.u}`;
        document.getElementById('m-data').innerHTML = `Torre ${item.t} | Modelo ${item.m}<br>Vista ${item.v}<br>Entrega ${item.t === 'A' ? 'Dic 2028' : 'Dic 2029'}<br><b>Precio ${item.p}</b>`;
        
        carousel.innerHTML = `<button class="nav-btn prev" onclick="manualMove(-1)">&#10094;</button><img class="slide-img active" src="${modelKey}-1.jpg" onerror="this.src='comodin.jpg'"><img class="slide-img" src="${modelKey}-2.jpg" onerror="this.style.display='none'"><img class="slide-img" src="${modelKey}-3.jpg" onerror="this.style.display='none'"><button class="nav-btn next" onclick="manualMove(1)">&#10095;</button>`;
        
        // --- NUEVA LÓGICA TÁCTIL ---
        carousel.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        carousel.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        }, {passive: true});
        // ---------------------------

        slideIdx = 0; startAutoCarousel();
        document.getElementById('res-card').style.display = 'none';
        document.querySelectorAll('.btn-pago').forEach(b => b.classList.remove('active'));
        document.getElementById('unitModal').style.display = 'block';
    }

    function handleGesture() {
        if (touchendX < touchstartX - 50) manualMove(1);  // Desliza a la izquierda -> Siguiente
        if (touchendX > touchstartX + 50) manualMove(-1); // Desliza a la derecha -> Anterior
    }

    function startAutoCarousel() { clearInterval(autoInterval); autoInterval = setInterval(() => moveSlide(1), 5000); }
    function manualMove(n) { clearInterval(autoInterval); moveSlide(n); setTimeout(startAutoCarousel, 3000); }
    function moveSlide(n) { const s = document.querySelectorAll('.slide-img'), v = Array.from(s).filter(x => x.style.display !== 'none'); if (v.length <= 1) return; v[slideIdx].classList.remove('active'); slideIdx = (slideIdx + n + v.length) % v.length; v[slideIdx].classList.add('active'); }

    function runCalc(btn, d, c, e, ds, n) {
        document.querySelectorAll('.btn-pago').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        const final = curPrice * (1 - ds), m = curTorre === 'A' ? 31 : 43;
        document.getElementById('res-plan-name').innerText = n;
        document.getElementById('res-list').innerText = fmt(curPrice);
        if(ds > 0) { document.getElementById('row-desc').style.display = 'flex'; document.getElementById('res-desc-val').innerHTML = `- ${fmt(curPrice * ds)} (${Math.round(ds * 100)}%)`; } else { document.getElementById('row-desc').style.display = 'none'; }
        document.getElementById('res-down').innerText = fmt(final * d);
        const ob = document.getElementById('obra-block');
        if(c > 0) { ob.style.display = 'block'; document.getElementById('res-obra-total').innerText = fmt(final * c); document.getElementById('res-months-label').innerText = `${m} meses de:`; document.getElementById('res-monthly-val').innerText = fmt((final * c) / m); } else { ob.style.display = 'none'; }
        document.getElementById('res-delivery').innerText = fmt(final * e); document.getElementById('res-total').innerText = fmt(final);
        document.getElementById('res-note').innerText = `* Basado en entrega Torre ${curTorre} (${curTorre === 'A' ? 'Dic 2028' : 'Dic 2029'}).`;
        document.getElementById('res-card').style.display = 'block';
    }

    async function generarCaptura() {
        const area = document.getElementById('capture-area'), btn = document.getElementById('btn-screenshot'), cl = document.querySelector('.close'), nv = document.querySelectorAll('.nav-btn');
        btn.style.display = 'none'; cl.style.display = 'none'; nv.forEach(n => n.style.display = 'none');
        const canvas = await html2canvas(area, { scale: 2, useCORS: true, backgroundColor: "#FFFFFF" });
        const link = document.createElement('a'); link.download = `Nautica_${document.getElementById('modal-title').innerText.replace(/\s+/g,'_')}.png`; link.href = canvas.toDataURL('image/png'); link.click();
        btn.style.display = 'flex'; cl.style.display = 'block'; nv.forEach(n => n.style.display = 'block');
    }

    function fmt(n) { return '$ ' + Math.round(n).toLocaleString('es-MX'); }
    function closeModal() { clearInterval(autoInterval); document.getElementById('unitModal').style.display = 'none'; }
    
    document.querySelectorAll('select').forEach(s => s.addEventListener('change', () => {
        const t = document.getElementById('f-torre').value, r = document.getElementById('f-recamaras').value, v = document.getElementById('f-vista').value.toLowerCase();
        const f = inventory.filter(i => (t === 'all' || i.t === t) && (r === 'all' || i.r === r) && (v === 'all' || i.v.toLowerCase().includes(v)));
        renderCatalog(f);
    }));
</script>
